
spring:
   #Mongo DB configurations
   data:
      mongodb:
         uri: ${MONGO_URI}
      redis:
         url: ${REDIS_URI}
         timeout: 2000ms

#Eureka Configurations
eureka:
   client:
      register-with-eureka: true
      fetch-registry: true
      serviceUrl:
         defaultZone: ${EUREKA_DEFAULTZONE}
   instance:
      hostname: localhost

#Actuator and prometheus configuration
management:
   endpoints:
      prometheus:
         enabled: true
      web:
         exposure:
            include:
               - info
               - health
               - metrics
   metrics:
      tags:
         application: POST-SERVICE

#AWS Configuration
aws:
   credentials:
      accessKey: ${AWS_ACCESS_KEY}
      secretKey: ${AWS_SECRET_KEY}
      region: ${AWS_REGION}
   s3:
      bucket-name: ${AWS_S3_BUCKET}
      enabled: true

custom:
   security:
      policies:
         - path-expression: /post/api/v1/**
           service-names:
              - gateway-controller

security:
   filters:
      gateway-auth:
         enabled: true

rate-limiter:
   enabled: true
   tokenBucket:
      enabled: false
   slidingWindowRedis:
      enabled: true